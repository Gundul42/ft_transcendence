version: '3.3'

services:
  nginx:
    container_name: transcendence_nginx
    restart: always
    depends_on:
      - backend
    image: "nginx:latest"
    links:
      - backend
    ports:
      - 443:443
      - 80:80
    networks:
      - app
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend/content:/var/www/html/content:ro

  frontend:
    container_name: transcendence_frontend
    restart: always
    depends_on:
      - backend
    build: "./frontend"
    image: "frontend:latest"
    # ports:
    #   - 4242:4242
    #   - 3000:3000
    networks:
      - app
    volumes:
    #  - ./nginx/conf.d:/etc/nginx/conf.d:ro
    #  - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend/src:/var/www/html/frontend/src
    #  - ./frontend/src:/home/app_frontend/frontend/src:ro
    #  - ./frontend/content:/var/www/html/content:ro

  backend:
    container_name: transcendence_backend
    restart: always
    depends_on:
      - pgsql
    build: "./backend"
    image: "backend:latest"
    # ports:
    #   - 8000:8000
    #   - 9400:9400
    networks:
      - app
    volumes:
      - ./backend/src:/home/app_backend/backend/src:ro
      - ./backend/resources/tsconfig.json:/home/app_backend/backend/tsconfig.json:ro
      - ./.env://home/app_backend/backend/.env:ro

  pgsql:
    container_name: transcendence_pgsql
    restart: always
    image: postgres:latest
    build: ./postgres
    ports:
      - 5432:5432
    networks:
      - app
    volumes:
      - v_pgsql:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD
      - POSTGRES_USER
      - POSTGRES_DB

networks:
  app:
    driver: bridge
    name: transcendence_network

volumes:
  v_pgsql: