server {
		listen			443 ssl;
		listen			[::]:443 ssl;
		allow			0.0.0.0/0;
		server_name		ft_transcendence.io;
		ssl_certificate		/etc/nginx/ssl/ft_transcendence.crt;
		ssl_certificate_key	/etc/nginx/ssl/ft_transcendence.key;
		ssl_protocols		TLSv1.2 TLSv1.3;
		root			/var/www/html/frontend/build;
		index			index.html
		error_log /dev/stdout;
		access_log /dev/stdout;
		add_header 'Access-Control-Allow-Origin' '*';
		add_header 'Access-Control-Allow-Credentials' 'true';
		add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
		add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type';

		location / {
			proxy_pass https://localhost:3000;
			proxy_buffering off;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-Host $host;
			proxy_set_header X-Forwarded-Port $server_port;
		}

		location /api/ {
			proxy_pass https://localhost:8000/api/;
			proxy_buffering off;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-Host $host;
			proxy_set_header X-Forwarded-Port $server_port;
		}
}